ai_usage_summary: |
  Used Gemini for architecture discussion, code generation, and data analysis.
  No candidate data was fed to any LLM during the ranking step.
  The ranking logic is entirely deterministic and rule-based — no LLM calls
  are made during inference.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage rule-based ranker with explicit reasoning capture. Four-stage
  pipeline: (1) honeypot detection + hard filters eliminate ~85K obviously
  unfit candidates using JD-derived disqualifiers; (2) 8-axis weighted scoring
  (title fit, trust-weighted skill relevance, career trajectory NLP analysis,
  experience band, domain/industry, location, education, certifications);
  (3) multiplicative behavioral modifier from 10 Redrob engagement signals
  (recency, response rate, notice period, GitHub activity, etc.); (4) per-
  candidate reasoning grounded in actual profile data. The skill scorer uses
  a trust-multiplier (duration × endorsements × proficiency) to catch keyword
  stuffers. Runtime: ~30 seconds for 100K candidates on CPU.

# ============================================================================
# Declarations
